services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - db.railway.internal

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=db.railway.internal
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - auth-service.railway.internal

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=db.railway.internal
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - user-service.railway.internal

  quiz-service:
    build:
      context: .
      dockerfile: quiz-service/Dockerfile
    ports:
      - "8083:8080"
    environment:
      - DB_HOST=db.railway.internal
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - quiz-service.railway.internal

  result-service:
    build:
      context: .
      dockerfile: result-service/Dockerfile
    ports:
      - "8084:8080"
    environment:
      - DB_HOST=db.railway.internal
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - result-service.railway.internal

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8085:8080"
    environment:
      - DB_HOST=db.railway.internal
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - notification-service.railway.internal

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - PORT=80
    depends_on:
      - auth-service
      - user-service
      - quiz-service
      - result-service
      - notification-service

volumes:
  postgres_data:
